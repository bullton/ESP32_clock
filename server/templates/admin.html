<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨水屏后台管理</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        textarea { width: 100%; height: 100px; font-size: 14px; padding: 8px; box-sizing: border-box; }
        input[type="text"] { width: 100%; height: 36px; font-size: 14px; padding: 0 8px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; }
        button:hover { background: #45a049; }
        .msg { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .preview { background: #f5f5f5; padding: 15px; margin-top: 20px; border-radius: 4px; }
        .preview-text { background: white; padding: 10px; margin-top: 10px; border: 1px solid #ddd; min-height: 60px; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>墨水屏后台管理</h1>
    
    <div class="form-group">
        <label for="content">底部自定义内容（支持多行）：</label>
        <textarea id="content" placeholder="输入要显示在底部的内容..."></textarea>
    </div>
    
    <button onclick="saveContent()">保存</button>
    
    <div id="msg"></div>
    
    <div class="preview">
        <strong>预览：</strong>
        <div class="preview-text" id="preview"></div>
    </div>

    <script>
        async function loadContent() {
            try {
                const res = await fetch('/api/bottom_content');
                const data = await res.json();
                document.getElementById('content').value = data.content || '';
                document.getElementById('preview').textContent = data.content || '(空)';
            } catch (e) {
                console.error(e);
            }
        }
        
        async function saveContent() {
            const content = document.getElementById('content').value;
            const msg = document.getElementById('msg');
            try {
                const res = await fetch('/api/bottom_content', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content})
                });
                if (res.ok) {
                    msg.innerHTML = '<div class="msg success">保存成功！</div>';
                    document.getElementById('preview').textContent = content || '(空)';
                } else {
                    msg.innerHTML = '<div class="msg error">保存失败</div>';
                }
            } catch (e) {
                msg.innerHTML = '<div class="msg error">保存失败: ' + e + '</div>';
            }
        }
        
        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('preview').textContent = this.value || '(空)';
        });
        
        loadContent();
    </script>
</body>
</html>
